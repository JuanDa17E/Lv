<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartas para ti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>

  <!-- SCSS compilado por Live Sass Compiler -->
 <link rel="stylesheet" href="../global/global.css">
  <link rel="stylesheet" href="../global/cover.css"/>
</head>
<body>

<!-- ═══ PORTADA ═══ -->
<section id="cover">
  <div class="frame"></div>

  <p class="c-eyebrow">un mes más · juntos</p>

  <div class="snoopy-hero" id="snoopy-cover"></div>

  <h1 class="c-title">Cartas<br/>para ti</h1>
  <p class="c-for">para <span class="c-name" id="cover-nombre"></span></p>

  <div class="c-line"></div>

  <a href="#meses" class="c-scroll">
    leer las cartas
    <svg width="16" height="20" viewBox="0 0 16 20" fill="none">
      <path d="M8 1 L8 16 M2 10 L8 17 L14 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</section>

<!-- ═══ NAV ═══ -->
<nav>
  <a href="index.html" class="nav-brand">Cartas para ti</a>
  <ul class="nav-months" id="nav-months"></ul>
</nav>

<!-- ═══ LISTA DE MESES ═══ -->
<main id="meses" style="max-width:720px;margin:0 auto;padding:4rem 1.5rem 6rem;">
  <div id="lista-meses"></div>
</main>

<!-- ═══ FOOTER ═══ -->
<footer>
  <svg width="70" height="55" viewBox="0 0 70 55" fill="none">
    <circle cx="48" cy="18" r="13" fill="rgba(255,255,255,0.8)"/>
    <ellipse cx="40" cy="27" rx="5" ry="9" fill="rgba(255,255,255,0.4)" transform="rotate(-12 40 27)"/>
    <ellipse cx="56" cy="15" rx="4" ry="2.5" fill="rgba(255,255,255,0.4)"/>
    <circle cx="51" cy="11" r="2" fill="rgba(255,255,255,0.4)"/>
    <ellipse cx="35" cy="38" rx="16" ry="13" fill="rgba(255,255,255,0.8)"/>
    <ellipse cx="28" cy="49" rx="9" ry="5" fill="rgba(255,255,255,0.6)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <ellipse cx="42" cy="49" rx="9" ry="5" fill="rgba(255,255,255,0.6)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="5"  y="15" font-size="10" fill="rgba(255,255,255,0.25)" font-family="serif">✦</text>
    <text x="58" y="8"  font-size="7"  fill="rgba(255,255,255,0.2)"  font-family="serif">✦</text>
    <text x="12" y="38" font-size="6"  fill="rgba(255,255,255,0.15)" font-family="serif">✦</text>
  </svg>
  <p>escrito con amor · mes a mes<br/>para siempre</p>
</footer>

<button id="btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- ═══ CONFIG ═══ -->
<script>
  // ── Edita aquí los nombres ──
  const NOMBRE = "Ivana";
  const FIRMA  = "Juan";

  // ── Agrega una línea por cada mes que exista ──
  // { mes: número, titulo: "título libre", fecha: "Mes Año" }
  const MESES = [
    { mes: 1, titulo: "Primer Mes",    fecha: "Noviembre 2025"  },
    { mes: 2, titulo: "Segundo Mes",   fecha: "Diciembre 2025"  },
    { mes: 3, titulo: "Tercer Mes",     fecha: "Enero 2025"   },
    { mes: 4, titulo: "Cuarto Mes",     fecha: "Febrero 2025"   },
    { mes: 5, titulo: "Quinto Mes",     fecha: "Marzo 2025"   },
    { mes: 6, titulo: "Sexto Mes",      fecha: "Abril 2025"   },
    { mes: 7, titulo: "Séptimo Mes",    fecha: "Mayo 2025"   },
    
  ];
</script>

<script src="../global/snoopy.js"></script>
<script>
  // ── Portada ──
  document.getElementById('cover-nombre').textContent = NOMBRE;
  document.getElementById('snoopy-cover').innerHTML = `
    <svg width="140" height="140" viewBox="0 0 140 140" fill="none">
      <path d="M70 115 C70 115 38 95 30 78 C22 61 32 48 45 48 C54 48 62 55 70 65 C78 55 86 48 95 48 C108 48 118 61 110 78 C102 95 70 115 70 115Z" fill="white" opacity="0.15"/>
      <path d="M70 110 C70 110 40 91 33 75 C26 59 35 48 47 48 C56 48 64 55 70 64 C76 55 84 48 93 48 C105 48 114 59 107 75 C100 91 70 110 70 110Z" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <ellipse cx="70" cy="75" rx="22" ry="17" fill="white"/>
      <circle cx="96" cy="52" r="20" fill="white"/>
      <ellipse cx="88" cy="63" rx="7" ry="12" fill="#1a1a1a" transform="rotate(-12 88 63)"/>
      <ellipse cx="112" cy="49" rx="6" ry="4" fill="#1a1a1a"/>
      <circle cx="104" cy="43" r="3" fill="#1a1a1a"/>
      <path d="M105 57 Q110 62 116 57" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M99 39 C99 39 97 36 99 34 C101 32 103 34 103 34 C103 34 105 32 107 34 C109 36 107 39 103 41 C101 42 99 39 99 39Z" fill="#1a1a1a" opacity="0.7"/>
      <path d="M48 72 Q42 80 38 90" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M92 72 Q98 80 102 90" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
      <ellipse cx="60" cy="90" rx="10" ry="6" fill="white" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <ellipse cx="80" cy="90" rx="10" ry="6" fill="white" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    </svg>`;

  // ── Nav ──
  function ordinal(n) {
    const arr = ['','Primer','Segundo','Tercer','Cuarto','Quinto','Sexto',
                 'Séptimo','Octavo','Noveno','Décimo','Undécimo','Duodécimo'];
    return arr[n] || `${n}°`;
  }

  document.getElementById('nav-months').innerHTML = MESES.map(m =>
    `<li><a href="../Meses/mes-${String(m.mes).padStart(2,'0')}.html">${ordinal(m.mes)} mes</a></li>`
  ).join('');

  // ── Lista de meses (tarjetas de acceso) ──
  document.getElementById('lista-meses').innerHTML = MESES.map((m, i) => `
    <a href="../Meses/mes-${String(m.mes).padStart(2,'0')}.html"
       style="display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:1.5rem;
              padding:2rem 0;border-bottom:1px solid var(--light);text-decoration:none;color:var(--ink);
              transition:opacity 0.2s;"
       onmouseover="this.style.opacity='0.55'"
       onmouseout="this.style.opacity='1'">
      <span style="font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;
                   line-height:1;color:var(--paper3);letter-spacing:-0.04em;user-select:none;">
        ${String(m.mes).padStart(2,'0')}
      </span>
      <span>
        <span style="display:block;font-family:'Space Mono',monospace;font-size:9px;
                     letter-spacing:0.3em;text-transform:uppercase;color:var(--gray);
                     margin-bottom:0.4rem;">${ordinal(m.mes)} mes · ${m.fecha}</span>
        <span style="font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;">
          ${m.titulo}
        </span>
      </span>
      <span style="font-size:1.2rem;color:var(--light);">→</span>
    </a>`
  ).join('');

  // ── Scroll top ──
  window.addEventListener('scroll', () => {
    document.getElementById('btn-top').classList.toggle('show', window.scrollY > 400);
  });
</script>

<script src="../js/global.js"></script>
<script>
  document.getElementById("firma-nombre").textContent = FIRMA;
</script>
<script>
  document.getElementById("nombre").textContent = NOMBRE;
</script>
</body>
</html>
